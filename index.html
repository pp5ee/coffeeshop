<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Coffee Shop</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Game Screens -->
  <div id="start-screen" class="screen active">
    <h1>Pixel Coffee Shop</h1>
    <p>Serve customers quickly and accurately to earn money!</p>
    <button id="start-btn">Start Day</button>
  </div>

  <div id="game-screen" class="screen">
    <div id="game-container">
      <canvas id="game-canvas" width="800" height="600"></canvas>
      <div id="ui-overlay">
        <div id="money-counter">$0.00</div>
        <div id="day-timer">60s</div>
        <div id="feedback-message"></div>

        <!-- Drink Preparation UI -->
        <div id="drink-ui">
          <h3>Prepare Drink</h3>
          <div class="drink-step">
            <label>Cup Size:</label>
            <button data-cup="small">Small</button>
            <button data-cup="medium">Medium</button>
            <button data-cup="large">Large</button>
          </div>
          <div class="drink-step">
            <label>Espresso Shots:</label>
            <button data-shots="1">1 Shot</button>
            <button data-shots="2">2 Shots</button>
          </div>
          <div class="drink-step">
            <label>Milk:</label>
            <button data-milk="none">None</button>
            <button data-milk="steamed">Steamed</button>
            <button data-milk="foam">Foam</button>
          </div>
          <button id="serve-btn">Serve Drink</button>
        </div>
      </div>
    </div>
  </div>

  <div id="summary-screen" class="screen">
    <h1>End of Day</h1>
    <div id="stats">
      <p>Orders Served: <span id="served-count">0</span></p>
      <p>Money Earned: $<span id="money-earned">0.00</span></p>
    </div>
    <button id="play-again-btn">Play Again</button>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
